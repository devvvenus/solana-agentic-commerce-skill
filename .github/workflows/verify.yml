name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/express-paid-api/package-lock.json

      - name: Install example dependencies
        run: npm ci --prefix examples/express-paid-api

      - name: Verify repository and example
        run: npm run verify
